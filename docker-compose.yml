
services:
  task-manager:
    image: task-manager
    build: .
    ports:
      - "8080:8080"


  postgres:
    image: postgres:16
    container_name: task-manager-postgres-db
    environment:
      POSTGRES_USER: admin # имя пользователя
      POSTGRES_PASSWORD: secret # пароль
      POSTGRES_DB: tasks-db # имя БД по умолчанию
      LC_MESSAGES: en_US.UTF-8 # язык ошибок - английский
    ports:
      - "5432:5432" # проброс порта PostgreSQL
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped


  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadminT
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@email.com # учётка для входа
      PGADMIN_DEFAULT_PASSWORD: admin # пароль для входа
    ports:
      - "8081:80" # UI будет доступен по localhost:8081
    depends_on:
      - postgres
    restart: unless-stopped


volumes:
  pgdata: